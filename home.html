<!DOCTYPE html>
<html lang="en">
<head>
    <title>KlhConnect</title>
    <link rel="stylesheet" href="KlhConnect_style.css">
</head>
<body id="homeBody">
    <header>
        <img id="headerLogo" src="images/KLH_Logo.png" alt="KlhConnect Logo">
        <p id="userNameDisplay">Loading...</p>
    </header>
    <div id="nav">
        <button class="navButton" id="all" onclick="loadPosts('all')">All</button>
        <button class="navButton" id="announcements" onclick="loadPosts('announcement')">Announcement</button>
        <button class="navButton" id="Events" onclick="loadPosts('event')">Events</button>
        <button class="navButton" id="Exams" onclick="loadPosts('exam')">Exams</button>
        <button class="navButton" id="Holidays" onclick="loadPosts('holiday')">Holidays</button>
    </div>

    <div id="msgSpace"></div>

    <!-- moved outside msgSpace -->
    <button id="SendMessageButton" onclick="window.location.href='UploadPage.html'">+</button>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="home.js"></script>
</body>
</html>
